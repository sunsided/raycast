# https://github.com/go-task/task
version: "3"

vars:
  DEFAULT_WIDTH: "640"
  DEFAULT_HEIGHT: "480"

tasks:
  fmt:
    desc: Format the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo fmt

  lint:
    desc: Lint the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo clippy

  lint:fix:
    desc: Lint and fix the code
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo clippy --fix --allow-staged

  test:
    desc: Run all tests
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo test

  build:
    desc: Build the workspace
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    sources:
      - Cargo.lock
      - Cargo.toml
      - src/**/*.rs
    generates:
      - target/debug/raycast
    cmds:
      - cargo build

  run:
    desc: Run the raycasting engine
    aliases:
      - start
      - gui
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - cargo run --release

  docs:
    desc: Build rustdoc
    aliases:
      - doc
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - "cargo doc --no-deps --all-features"

  docs:open:
    desc: Build rustdoc (and open them)
    aliases:
      - doc:open
    preconditions:
      - sh: command -v cargo >/dev/null 2>&1
        msg: cargo is not installed. Please install Rust via https://rustup.rs
    cmds:
      - "cargo doc --no-deps --all-features --open"
